[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smart-search"
version = "0.2.0"
description = "Local MCP server for semantic search over Markdown, PDF, and DOCX documents"
requires-python = ">=3.11"
dependencies = [
    "fastmcp",
    "docling",
    "lancedb",
    "sentence-transformers",
    "optimum[onnxruntime]",
    "pyarrow",
    "pydantic>=2.0",
    "pydantic-settings",
    "einops",
    "watchdog",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "reportlab",
    "python-docx",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not slow'"
markers = ["slow: Tests that load ML models or process real files"]
